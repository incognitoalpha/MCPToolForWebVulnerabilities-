[project]
name = "pentest-mcp"
version = "0.1.0"
description = "MCP Server for Penetration Testing with Gemini API"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0.0",
    "typer>=0.12.0",
    "httpx>=0.27.0",
    "dnspython>=2.6.0",
    "python-nmap>=0.7.1",
    "groq>=0.9.0",
    "google-genai>=0.3.0",
    "aiosqlite>=0.20.0",
    "structlog>=24.1.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0.0",
    "rich>=13.0.0",
    "playwright>=1.58.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
]

[project.scripts]
pentest = "pentest_mcp.cli:app"
pentest-mcp-server = "pentest_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[dependency-groups]
dev = [
    "ruff>=0.15.8",
]
